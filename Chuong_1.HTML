<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MMT – Chương 1: Luyện Tập Trắc Nghiệm</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0e1a;
        --surface: #111827;
        --surface2: #1a2235;
        --border: #1e2d45;
        --accent: #00d4ff;
        --accent2: #7c3aed;
        --accent3: #10b981;
        --danger: #ef4444;
        --text: #e2e8f0;
        --text2: #94a3b8;
        --text3: #64748b;
        --correct: #10b981;
        --wrong: #ef4444;
        --glow: 0 0 20px rgba(0, 212, 255, 0.15);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Be Vietnam Pro", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        background-image:
          radial-gradient(
            ellipse at 10% 20%,
            rgba(0, 212, 255, 0.04) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse at 90% 80%,
            rgba(124, 58, 237, 0.05) 0%,
            transparent 60%
          );
      }
      /* ── Header ── */
      .header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 16px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(12px);
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .logo-badge {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 6px;
        letter-spacing: 0.5px;
      }
      .header-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
      }
      .header-sub {
        font-size: 12px;
        color: var(--text3);
        font-family: "JetBrains Mono", monospace;
      }
      .score-badge {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 16px;
      }
      .score-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 20px;
        font-weight: 600;
        color: var(--accent);
      }
      .score-label {
        font-size: 11px;
        color: var(--text3);
      }

      /* ── Progress ── */
      .progress-wrap {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 10px 24px;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .progress-bar-bg {
        flex: 1;
        height: 5px;
        background: var(--border);
        border-radius: 99px;
        overflow: hidden;
      }
      .progress-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        border-radius: 99px;
        transition: width 0.4s ease;
      }
      .progress-text {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--text3);
        white-space: nowrap;
      }

      /* ── Main ── */
      .main {
        max-width: 820px;
        margin: 0 auto;
        padding: 32px 20px 80px;
      }

      /* ── Topic Tag ── */
      .topic-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(0, 212, 255, 0.08);
        border: 1px solid rgba(0, 212, 255, 0.2);
        color: var(--accent);
        font-size: 11px;
        font-weight: 600;
        font-family: "JetBrains Mono", monospace;
        padding: 4px 12px;
        border-radius: 99px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 20px;
      }

      /* ── Question Card ── */
      .question-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px;
        margin-bottom: 20px;
        box-shadow: var(--glow);
        transition: border-color 0.3s;
        animation: fadeSlide 0.35s ease;
      }
      @keyframes fadeSlide {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .question-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--text3);
        margin-bottom: 12px;
      }
      .question-text {
        font-size: 17px;
        font-weight: 600;
        line-height: 1.65;
        color: var(--text);
      }

      /* ── Options ── */
      .options {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 24px;
      }
      .option-btn {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        background: var(--surface2);
        border: 1.5px solid var(--border);
        border-radius: 12px;
        padding: 14px 18px;
        cursor: pointer;
        transition: all 0.2s ease;
        text-align: left;
        font-family: "Be Vietnam Pro", sans-serif;
        color: var(--text);
        font-size: 15px;
        line-height: 1.5;
      }
      .option-btn:hover:not(:disabled) {
        border-color: var(--accent);
        background: rgba(0, 212, 255, 0.06);
        transform: translateX(4px);
      }
      .option-letter {
        flex-shrink: 0;
        width: 28px;
        height: 28px;
        background: var(--border);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        font-weight: 600;
        color: var(--text2);
        transition: all 0.2s;
      }
      .option-btn.correct {
        border-color: var(--correct);
        background: rgba(16, 185, 129, 0.08);
      }
      .option-btn.correct .option-letter {
        background: var(--correct);
        color: #fff;
      }
      .option-btn.wrong {
        border-color: var(--wrong);
        background: rgba(239, 68, 68, 0.08);
      }
      .option-btn.wrong .option-letter {
        background: var(--wrong);
        color: #fff;
      }
      .option-btn.correct-reveal {
        border-color: var(--correct);
        background: rgba(16, 185, 129, 0.05);
      }
      .option-btn.correct-reveal .option-letter {
        background: var(--correct);
        color: #fff;
      }
      .option-btn:disabled {
        cursor: default;
      }

      /* ── Feedback ── */
      .feedback {
        margin-top: 20px;
        padding: 14px 18px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
        animation: fadeIn 0.25s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .feedback.correct {
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.25);
        color: var(--correct);
      }
      .feedback.wrong {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.25);
        color: var(--wrong);
      }
      .feedback-icon {
        font-size: 18px;
      }

      /* ── Controls ── */
      .controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 24px;
      }
      .btn-next {
        background: linear-gradient(135deg, var(--accent), #0099cc);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 12px 28px;
        font-family: "Be Vietnam Pro", sans-serif;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        flex: 1;
      }
      .btn-next:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 25px rgba(0, 212, 255, 0.25);
      }
      .btn-skip {
        background: var(--surface2);
        color: var(--text2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 22px;
        font-family: "Be Vietnam Pro", sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-skip:hover {
        border-color: var(--text3);
        color: var(--text);
      }

      /* ── Filters ── */
      .filter-wrap {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 24px;
      }
      .filter-btn {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text3);
        border-radius: 99px;
        padding: 6px 14px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        font-family: "Be Vietnam Pro", sans-serif;
        transition: all 0.2s;
      }
      .filter-btn:hover,
      .filter-btn.active {
        background: rgba(0, 212, 255, 0.08);
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ── Summary Screen ── */
      .summary-screen {
        text-align: center;
        padding: 60px 20px;
        animation: fadeSlide 0.5s ease;
      }
      .summary-circle {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        border: 4px solid var(--accent);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0 auto 32px;
        background: rgba(0, 212, 255, 0.05);
        box-shadow: 0 0 40px rgba(0, 212, 255, 0.15);
      }
      .summary-pct {
        font-family: "JetBrains Mono", monospace;
        font-size: 36px;
        font-weight: 600;
        color: var(--accent);
      }
      .summary-title {
        font-size: 26px;
        font-weight: 800;
        margin-bottom: 12px;
      }
      .summary-sub {
        color: var(--text2);
        font-size: 15px;
        margin-bottom: 32px;
      }
      .summary-stats {
        display: flex;
        gap: 16px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 36px;
      }
      .stat-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px 24px;
        min-width: 120px;
      }
      .stat-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 28px;
        font-weight: 700;
      }
      .stat-num.g {
        color: var(--correct);
      }
      .stat-num.r {
        color: var(--wrong);
      }
      .stat-num.b {
        color: var(--accent);
      }
      .stat-lbl {
        font-size: 12px;
        color: var(--text3);
        margin-top: 4px;
      }
      .btn-restart {
        background: linear-gradient(135deg, var(--accent2), var(--accent));
        color: #fff;
        border: none;
        border-radius: 12px;
        padding: 14px 36px;
        font-family: "Be Vietnam Pro", sans-serif;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        margin: 6px;
      }
      .btn-restart:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
      }

      /* ── Home Screen ── */
      .home-screen {
        text-align: center;
        padding: 50px 20px;
        animation: fadeSlide 0.5s ease;
      }
      .home-title {
        font-size: 34px;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 10px;
      }
      .home-sub {
        color: var(--text2);
        font-size: 16px;
        margin-bottom: 40px;
        line-height: 1.6;
      }
      .mode-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        max-width: 600px;
        margin: 0 auto 36px;
      }
      .mode-card {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: 14px;
        padding: 24px 20px;
        cursor: pointer;
        transition: all 0.25s;
        text-align: left;
      }
      .mode-card:hover {
        border-color: var(--accent);
        transform: translateY(-3px);
        box-shadow: 0 12px 35px rgba(0, 212, 255, 0.1);
      }
      .mode-card.selected {
        border-color: var(--accent);
        background: rgba(0, 212, 255, 0.06);
      }
      .mode-icon {
        font-size: 28px;
        margin-bottom: 10px;
      }
      .mode-name {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .mode-desc {
        font-size: 13px;
        color: var(--text2);
        line-height: 1.5;
      }
      .topic-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 10px;
        max-width: 700px;
        margin: 0 auto 36px;
        text-align: left;
      }
      .topic-card {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: 10px;
        padding: 14px 16px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .topic-card:hover {
        border-color: var(--accent);
        background: rgba(0, 212, 255, 0.04);
      }
      .topic-card.selected {
        border-color: var(--accent2);
        background: rgba(124, 58, 237, 0.06);
      }
      .topic-card-name {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .topic-card-count {
        font-size: 11px;
        color: var(--text3);
        font-family: "JetBrains Mono", monospace;
      }
      .btn-start {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
        border: none;
        border-radius: 12px;
        padding: 15px 48px;
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        font-family: "Be Vietnam Pro", sans-serif;
      }
      .btn-start:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 35px rgba(0, 212, 255, 0.25);
      }
      .section-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text2);
        text-align: left;
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      @media (max-width: 600px) {
        .mode-grid {
          grid-template-columns: 1fr;
        }
        .header {
          flex-direction: column;
          gap: 10px;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-left">
        <span class="logo-badge">MMT</span>
        <div>
          <div class="header-title">Mạng Máy Tính – Chương 1</div>
          <div class="header-sub">
            ĐH Kinh tế Quốc dân · Tổng quan MMT & TSL
          </div>
        </div>
      </div>
      <div class="score-badge" id="scoreDisplay" style="display: none">
        <div>
          <div class="score-num" id="scoreNum">0/0</div>
          <div class="score-label">Điểm số</div>
        </div>
      </div>
    </div>

    <div class="progress-wrap" id="progressWrap" style="display: none">
      <div class="progress-bar-bg">
        <div
          class="progress-bar-fill"
          id="progressFill"
          style="width: 0%"
        ></div>
      </div>
      <div class="progress-text" id="progressText">0 / 0</div>
    </div>

    <div class="main" id="appRoot"></div>

    <script>
      // ─────────────────────────────────────────────
      // QUESTION BANK – 500 câu
      // ─────────────────────────────────────────────
      const QUESTIONS = [
        // ── PHẦN 1: KHÁI NIỆM CƠ BẢN (1-50) ──────────
        {
          t: "Khái niệm cơ bản",
          q: "Mạng máy tính (Computer Network) được định nghĩa là:",
          a: [
            "Một máy tính có hiệu năng rất cao kết nối Internet",
            "Hệ thống gồm các máy tính đơn lẻ kết nối qua đường truyền vật lý theo kiến trúc mạng xác định, có khả năng trao đổi thông tin",
            "Tập hợp các phần mềm dùng để chia sẻ dữ liệu giữa hai máy tính",
            "Một giao thức truyền thông giữa hai hoặc nhiều thiết bị điện tử",
          ],
          c: 1,
        },
        {
          t: "Khái niệm cơ bản",
          q: "Trong mạng máy tính, các máy tính đơn lẻ còn được gọi là:",
          a: [
            "Thiết bị trung gian",
            "Bộ định tuyến",
            "Nút mạng (Network Node)",
            "Cổng mạng",
          ],
          c: 2,
        },
        {
          t: "Khái niệm cơ bản",
          q: "Đường truyền vật lý hữu tuyến bao gồm loại nào sau đây?",
          a: [
            "Sóng hồng ngoại và viba",
            "Vệ tinh và sóng vi ba",
            "Cáp xoắn đôi, cáp quang, cáp đồng trục",
            "Sóng điện từ và sóng vô tuyến",
          ],
          c: 2,
        },
        {
          t: "Khái niệm cơ bản",
          q: "Đường truyền vật lý vô tuyến bao gồm:",
          a: [
            "Cáp xoắn đôi và cáp quang",
            "Cáp đồng trục và cáp quang",
            "Cáp UTP và cáp STP",
            "Sóng hồng ngoại, viba, vệ tinh",
          ],
          c: 3,
        },
        {
          t: "Khái niệm cơ bản",
          q: "Kiến trúc mạng (Network Architecture) là gì?",
          a: [
            "Thiết kế vật lý của các thiết bị phần cứng mạng",
            "Cách thức kết nối và trao đổi thông tin trong mạng",
            "Phần mềm điều hành hệ thống mạng",
            "Sơ đồ bố trí phòng máy chủ",
          ],
          c: 1,
        },
        {
          t: "Khái niệm cơ bản",
          q: "Hình trạng mạng (Topology) mô tả điều gì?",
          a: [
            "Giao thức truyền thông giữa các nút mạng",
            "Cách thức các nút mạng kết nối với nhau",
            "Tốc độ truyền dữ liệu trong mạng",
            "Số lượng thiết bị tối đa trong mạng",
          ],
          c: 1,
        },
        {
          t: "Khái niệm cơ bản",
          q: "Giao thức mạng (Protocol) là:",
          a: [
            "Thiết bị phần cứng dùng để kết nối các mạng",
            "Cách thức các nút mạng trao đổi thông tin với nhau",
            "Hình dạng vật lý của đường cáp mạng",
            "Bộ nhớ dùng lưu trữ dữ liệu tạm thời",
          ],
          c: 1,
        },
        {
          t: "Khái niệm cơ bản",
          q: "Hai thành phần cơ bản tạo nên kiến trúc mạng là:",
          a: [
            "Server và Client",
            "Hình trạng mạng (Topology) và Giao thức mạng (Protocol)",
            "Phần cứng và Phần mềm",
            "LAN và WAN",
          ],
          c: 1,
        },
        {
          t: "Khái niệm cơ bản",
          q: "Loại phương tiện truyền thông nào sử dụng xung ánh sáng?",
          a: [
            "Dây kim loại trong cáp",
            "Truyền dẫn không dây",
            "Sợi thủy tinh hoặc plastic bên trong cáp (cáp quang)",
            "Cáp đồng trục",
          ],
          c: 2,
        },
        {
          t: "Khái niệm cơ bản",
          q: "Loại phương tiện truyền thông nào sử dụng điều chế tần số của sóng điện từ?",
          a: [
            "Cáp quang",
            "Dây kim loại trong cáp",
            "Cáp xoắn đôi",
            "Truyền dẫn không dây",
          ],
          c: 3,
        },
        {
          t: "Khái niệm cơ bản",
          q: "Lợi ích nào sau đây KHÔNG phải lợi ích của mạng máy tính?",
          a: [
            "Chia sẻ tài nguyên chung không phụ thuộc vị trí địa lý",
            "Tạo môi trường giao tiếp và trao đổi thông tin",
            "Tăng hiệu năng xử lý của từng máy tính đơn lẻ",
            "Nâng cao độ tin cậy nhờ khả năng thay thế khi có sự cố",
          ],
          c: 2,
        },
        {
          t: "Khái niệm cơ bản",
          q: "Trong mạng máy tính, 'host' hay 'thiết bị đầu cuối' (end device) là:",
          a: [

      // ─────────────────────────────────────────────
      // APP STATE
      // ─────────────────────────────────────────────
      let state = {
        screen: "home", // home | quiz | summary
        mode: "all", // all | topic
        topic: null,
        questions: [],
        idx: 0,
        selected: null,
        answered: false,
        correct: 0,
        wrong: 0,
        skipped: 0,
        history: [],

      // ─────────────────────────────────────────────
      // HELPERS
      // ─────────────────────────────────────────────
      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function getTopics() {
        const map = {};
        QUESTIONS.forEach((q) => {
          map[q.t] = (map[q.t] || 0) + 1;
        });
        return map;
      }

      function getQuestions(mode, topic) {
        let pool =
          mode === "topic" && topic
            ? QUESTIONS.filter((q) => q.t === topic)
            : QUESTIONS;
        return shuffle(pool).map((q, i) => ({
          ...q,
          a: shuffle(q.a.map((text, idx) => ({ text, orig: idx }))),
          num: i + 1,
        }));
      }

      // ─────────────────────────────────────────────
      // RENDER
      // ─────────────────────────────────────────────
      const root = document.getElementById("appRoot");
      const scoreDisplay = document.getElementById("scoreDisplay");
      const scoreNum = document.getElementById("scoreNum");
      const progressWrap = document.getElementById("progressWrap");
      const progressFill = document.getElementById("progressFill");
      const progressText = document.getElementById("progressText");

      function updateHeader() {
        if (state.screen === "quiz") {
          scoreDisplay.style.display = "flex";
          progressWrap.style.display = "flex";
          const total = state.correct + state.wrong;
          scoreNum.textContent = `${state.correct}/${total}`;
          const pct = state.questions.length
            ? (state.idx / state.questions.length) * 100
            : 0;
          progressFill.style.width = pct + "%";
          progressText.textContent = `${state.idx} / ${state.questions.length}`;
        } else {
          scoreDisplay.style.display = "none";
          progressWrap.style.display = "none";
        }
      }

      function renderHome() {
        state.screen = "home";
        updateHeader();
        const topics = getTopics();
        const topicKeys = Object.keys(topics);

        root.innerHTML = `
    <div class="home-screen">
      <div class="home-title">🖧 Luyện Tập Trắc Nghiệm</div>
      <div class="home-sub">500 câu hỏi · Chương 1: Tổng quan Mạng Máy Tính<br>Đại học Kinh tế Quốc dân – Khoa CNTT</div>

      <div class="section-title" style="max-width:620px;margin:0 auto 12px">Chế độ luyện tập</div>
      <div class="mode-grid" id="modeGrid">
        <div class="mode-card selected" data-mode="all" onclick="selectMode('all')">
          <div class="mode-icon">🎲</div>
          <div class="mode-name">Tất cả câu hỏi</div>
          <div class="mode-desc">500 câu ngẫu nhiên từ toàn bộ nội dung Chương 1</div>
        </div>
        <div class="mode-card" data-mode="topic" onclick="selectMode('topic')">
          <div class="mode-icon">📚</div>
          <div class="mode-name">Theo chủ đề</div>
          <div class="mode-desc">Luyện tập tập trung vào từng phần cụ thể</div>
        </div>
      </div>

      <div id="topicSection" style="display:none">
        <div class="section-title" style="max-width:700px;margin:20px auto 12px">Chọn chủ đề</div>
        <div class="topic-grid" id="topicGrid">
          ${topicKeys
            .map(
              (t) => `
            <div class="topic-card" data-topic="${t}" onclick="selectTopic('${t}')">
              <div class="topic-card-name">${t}</div>
              <div class="topic-card-count">${topics[t]} câu</div>
            </div>
          `,
            )
            .join("")}
        </div>
      </div>

      <button class="btn-start" onclick="startQuiz()">Bắt đầu luyện tập →</button>
    </div>
  `;
        state.mode = "all";
        state.topic = null;
      }

      function selectMode(mode) {
        state.mode = mode;
        document.querySelectorAll(".mode-card").forEach((el) => {
          el.classList.toggle("selected", el.dataset.mode === mode);
        });
        document.getElementById("topicSection").style.display =
          mode === "topic" ? "block" : "none";
        if (mode === "all") state.topic = null;
      }

      function selectTopic(t) {
        state.topic = t;
        document.querySelectorAll(".topic-card").forEach((el) => {
          el.classList.toggle("selected", el.dataset.topic === t);
        });
      }

      function startQuiz() {
        if (state.mode === "topic" && !state.topic) {
          alert("Vui lòng chọn một chủ đề!");
          return;
        }
        state.questions = getQuestions(state.mode, state.topic);
        state.idx = 0;
        state.correct = 0;
        state.wrong = 0;
        state.skipped = 0;
        state.history = [];
        state.screen = "quiz";
        renderQuestion();
      }

      function renderQuestion() {
        if (state.idx >= state.questions.length) {
          renderSummary();
          return;
        }
        const q = state.questions[state.idx];
        state.selected = null;
        state.answered = false;
        updateHeader();

        root.innerHTML = `
    <div class="topic-tag">📌 ${q.t} · Câu ${q.num}</div>
    <div class="question-card" id="qCard">
      <div class="question-num">CÂU ${state.idx + 1} / ${state.questions.length}</div>
      <div class="question-text">${q.q}</div>
      <div class="options" id="opts">
        ${q.a
          .map(
            (opt, i) => `
          <button class="option-btn" id="opt${i}" onclick="selectAnswer(${i})">
            <span class="option-letter">${String.fromCharCode(65 + i)}</span>
            <span>${opt.text}</span>
          </button>
        `,
          )
          .join("")}
      </div>
      <div id="feedback"></div>
    </div>
    <div class="controls">
      <button class="btn-next" id="btnNext" onclick="nextQuestion()" style="display:none">Câu tiếp theo →</button>
      <button class="btn-skip" onclick="skipQuestion()">Bỏ qua</button>
    </div>
  `;
      }

      function selectAnswer(i) {
        if (state.answered) return;
        state.answered = true;
        const q = state.questions[state.idx];
        state.selected = i;
        const correctOrigIdx = q.c;
        const selectedOrig = q.a[i].orig;
        const isCorrect = selectedOrig === correctOrigIdx;

        // Find the button that corresponds to the correct answer in shuffled order
        let correctBtn = -1;
        q.a.forEach((opt, idx) => {
          if (opt.orig === correctOrigIdx) correctBtn = idx;
        });

        document
          .querySelectorAll(".option-btn")
          .forEach((btn) => (btn.disabled = true));
        document
          .getElementById("opt" + i)
          .classList.add(isCorrect ? "correct" : "wrong");
        if (!isCorrect) {
          document
            .getElementById("opt" + correctBtn)
            .classList.add("correct-reveal");
        }

        const feedbackEl = document.getElementById("feedback");
        feedbackEl.innerHTML = isCorrect
          ? `<div class="feedback correct"><span class="feedback-icon">✅</span> Chính xác! Câu trả lời đúng.</div>`
          : `<div class="feedback wrong"><span class="feedback-icon">❌</span> Sai rồi! Đáp án đúng là: <strong>${String.fromCharCode(65 + correctBtn)}. ${q.a[correctBtn].text}</strong></div>`;

        document.getElementById("btnNext").style.display = "block";

        if (isCorrect) state.correct++;
        else state.wrong++;

        state.history.push({ q: q.q, correct: isCorrect });
        updateHeader();
      }

      function nextQuestion() {
        state.idx++;
        renderQuestion();
      }

      function skipQuestion() {
        state.skipped++;
        state.idx++;
        renderQuestion();
      }

      function renderSummary() {
        state.screen = "summary";
        updateHeader();
        const total = state.correct + state.wrong;
        const pct = total ? Math.round((state.correct / total) * 100) : 0;
        let grade =
          pct >= 90
            ? "🏆 Xuất sắc!"
            : pct >= 75
              ? "⭐ Tốt!"
              : pct >= 50
                ? "📖 Cần ôn thêm"
                : "💪 Hãy cố gắng hơn!";
        let gradeColor =
          pct >= 90
            ? "#10b981"
            : pct >= 75
              ? "#f59e0b"
              : pct >= 50
                ? "#3b82f6"
                : "#ef4444";

        root.innerHTML = `
    <div class="summary-screen">
      <div class="summary-circle">
        <div class="summary-pct" style="color:${gradeColor}">${pct}%</div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px">Tỷ lệ đúng</div>
      </div>
      <div class="summary-title">${grade}</div>
      <div class="summary-sub">Bạn đã hoàn thành bài luyện tập</div>
      <div class="summary-stats">
        <div class="stat-box">
          <div class="stat-num b">${state.questions.length}</div>
          <div class="stat-lbl">Tổng câu</div>
        </div>
        <div class="stat-box">
          <div class="stat-num g">${state.correct}</div>
          <div class="stat-lbl">Đúng</div>
        </div>
        <div class="stat-box">
          <div class="stat-num r">${state.wrong}</div>
          <div class="stat-lbl">Sai</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" style="color:var(--text3)">${state.skipped}</div>
          <div class="stat-lbl">Bỏ qua</div>
        </div>
      </div>
      <div>
        <button class="btn-restart" onclick="startQuiz()">🔄 Làm lại (câu mới ngẫu nhiên)</button>
        <button class="btn-restart" style="background:var(--surface);border:1px solid var(--border);color:var(--text)" onclick="renderHome()">🏠 Trang chủ</button>
      </div>
    </div>
  `;
      }

      // ─────────────────────────────────────────────
      // INIT
      // ─────────────────────────────────────────────
      renderHome();
    </script>
  </body>
</html>
